# Apache vhost — copy to the server, then:
#   sudo cp deploy/apache.apextradeai.tesnet.xyz.conf /etc/apache2/sites-available/
#   sudo a2ensite apextradeai.tesnet.xyz.conf
#   sudo a2enmod rewrite
#   sudo systemctl reload apache2
#
# Document root MUST be .../public (not the project root).

<VirtualHost *:80>
    ServerName apextradeai.tesnet.xyz
    DocumentRoot /var/www/ApexTradeAI/public

    <Directory /var/www/ApexTradeAI/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/apextradeai-error.log
    CustomLog ${APACHE_LOG_DIR}/apextradeai-access.log combined
</VirtualHost>
