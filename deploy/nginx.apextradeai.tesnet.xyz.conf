# Nginx server block — copy to the server, then:
#   sudo cp deploy/nginx.apextradeai.tesnet.xyz.conf /etc/nginx/sites-available/apextradeai.tesnet.xyz
#   sudo ln -s /etc/nginx/sites-available/apextradeai.tesnet.xyz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Document root MUST be .../public (not the project root).

server {
    listen 80;
    server_name apextradeai.tesnet.xyz;
    root /var/www/ApexTradeAI/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
